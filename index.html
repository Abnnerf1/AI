<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abnner's AI</title>
    
    <!-- SCRIPT OFICIAL DO GOOGLE PARA FAZER LOGIN -->
    <script src="https://google.com" async defer></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #212121;
            color: #ececf1;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* TELA DE LOGIN ESTILO OPENAI COM BOTÃO DO GOOGLE */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff; /* Branco clássico do ChatGPT login */
            color: #2d3748;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
        }

        .logo-icon {
            font-size: 42px;
            margin-bottom: 20px;
        }

        .login-box h2 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #000000;
        }

        .login-box p {
            font-size: 16px;
            color: #6e6e80;
            margin-bottom: 30px;
        }

        /* Alinhamento do Botão Injetado pelo Google */
        .google-btn-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }

        /* DESIGN DO INTERIOR DO CHAT */
        .container {
            display: none; /* Escondido até logar */
            width: 100%;
            height: 100%;
        }

        .sidebar {
            width: 260px;
            background-color: #171717;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .new-chat-btn {
            background: transparent;
            color: white;
            border: 1px solid #4d4d4d;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            text-align: left;
        }

        .new-chat-btn:hover {
            background-color: #2a2b32;
        }

        .chat-history {
            flex-grow: 1;
            margin-top: 20px;
        }

        .history-title {
            font-size: 12px;
            color: #666;
            padding: 5px;
        }

        .history-item {
            padding: 10px;
            border-radius: 5px;
            background-color: #212121;
            font-size: 14px;
        }

        .sidebar-footer {
            padding: 10px 5px;
            border-top: 1px solid #2d2d2d;
            font-size: 14px;
            color: #c5c5d2;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logout-link {
            color: #ff4a4a;
            cursor: pointer;
            text-decoration: underline;
            font-size: 13px;
        }

        .chat-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background-color: #212121;
            position: relative;
        }

        .chat-header {
            padding: 15px;
            text-align: center;
            font-size: 14px;
            color: #b4b4b4;
        }

        .chat-window {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px 10%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            max-width: 85%;
            line-height: 1.6;
            font-size: 16px;
        }

        .user-message {
            background-color: #2f2f2f;
            align-self: flex-end;
        }

        .ai-message, .system-message {
            background-color: transparent;
            align-self: flex-start;
        }

        .input-area {
            padding: 20px 10%;
        }

        .input-container {
            display: flex;
            align-items: center;
            background-color: #2f2f2f;
            border: 1px solid #4f4f4f;
            border-radius: 12px;
            padding: 10px;
            position: relative;
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            resize: none;
            outline: none;
            font-size: 16px;
            padding-right: 40px;
        }

        #sendBtn {
            position: absolute;
            right: 15px;
            bottom: 12px;
            background-color: #676767;
            color: #212121;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #sendBtn.active {
            background-color: #ffffff;
        }

        .disclaimer {
            font-size: 12px;
            color: #7d7d7d;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN COM O BOTÃO REAL DO GOOGLE -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <div class="logo-icon">🤖</div>
            <h2>Boas-vindas à Abnner's AI</h2>
            <p>Logue com sua Conta Google para continuar</p>
            
            <!-- O botão oficial do Google vai carregar dentro dessa tag div -->
            <div class="google-btn-wrapper">
                <div id="g_id_onload"
                     data-client_id="://googleusercontent.com"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleCredentialResponse"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                     data-type="standard"
                     data-shape="rounded"
                     data-theme="outline"
                     data-text="signin_with"
                     data-size="large"
                     data-logo_alignment="left">
                </div>
            </div>
        </div>
    </div>

    <!-- SITE DO CHAT -->
    <div class="container" id="mainContainer">
        <aside class="sidebar">
            <button class="new-chat-btn" onclick="window.location.reload()">+ Nova conversa</button>
            <div class="chat-history">
                <p class="history-title">Histórico recente</p>
                <div class="history-item">Conversa atual</div>
            </div>
            <div class="sidebar-footer">
                <span id="userDisplay">Usuário</span>
                <span class="logout-link" id="logoutBtn">Sair</span>
            </div>
        </aside>

        <main class="chat-area">
            <header class="chat-header">
                <h1>Abnner's AI</h1>
            </header>

            <div class="chat-window" id="chatWindow">
                <div class="message system-message" id="welcomeMessage">
                    Como posso ajudar você hoje?
                </div>
            </div>

            <footer class="input-area">
                <div class="input-container">
                    <textarea id="userInput" placeholder="Envie uma mensagem para a Abnner's AI..." rows="1"></textarea>
                    <button id="sendBtn">➔</button>
                </div>
                <p class="disclaimer">A Abnner's AI pode cometer erros. Considere verificar informações importantes.</p>
            </footer>
        </main>
    </div>

    <script>
        // Não se esqueça de preencher com sua chave da OpenAI para habilitar as respostas
        const OPENAI_API_KEY = "SUA_CHAVE_API_AQUI"; 

        const loginScreen = document.getElementById('loginScreen');
        const mainContainer = document.getElementById('mainContainer');
        const userDisplay = document.getElementById('userDisplay');
        const welcomeMessage = document.getElementById('welcomeMessage');
        const logoutBtn = document.getElementById('logoutBtn');
        
        const chatWindow = document.getElementById('chatWindow');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // Função que recebe os dados de login quando o Google valida a conta
        function handleCredentialResponse(response) {
            // Decodifica as informações básicas públicas contidas no token jwt do Google
            const base64Url = response.credential.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));

            const userData = JSON.parse(jsonPayload);
            
            // Salva o primeiro nome do usuário na sessão do navegador
            sessionStorage.setItem('activeUser', userData.given_name);
            logUserIn(userData.given_name);
        }

        function logUserIn(name) {
            loginScreen.style.display = 'none';
            mainContainer.style.display = 'flex';
            userDisplay.innerText = name;
